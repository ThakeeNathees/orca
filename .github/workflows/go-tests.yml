name: Go Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: compiler/go.mod
          cache-dependency-path: compiler/go.sum

      - name: Run tests
        run: go test ./...
        working-directory: compiler
