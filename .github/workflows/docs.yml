name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            docs/pnpm-lock.yaml
            studio/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: docs

      - run: pnpm run build
        working-directory: docs

      - run: pnpm install --frozen-lockfile
        working-directory: studio

      - run: pnpm run build
        working-directory: studio

      - name: Merge Studio into site
        run: mkdir -p docs/.vitepress/dist/studio && cp -r studio/out/. docs/.vitepress/dist/studio/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
